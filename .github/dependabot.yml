version: 2
updates:
  # GitHub Actions versions — keep composite action references current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - type:dependencies
      - size:S
    commit-message:
      prefix: "chore(deps)"

  # npm/python/cargo ecosystems will be added here once source trees land
  # (py/ and rust/ per CLAUDE.md repository layout)
