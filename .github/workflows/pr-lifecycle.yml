# Module 4 — PR Lifecycle (M4 of pipeline-redesign-v3)
#
# Purpose: single-responsibility PR push + open/reuse. Today this logic is
# the `Push branch + open PR` step in `develop.yml` (lines 221-281). M4
# extracts it so pr-lifecycle becomes the ONLY workflow that touches
# `gh pr` — removing the architectural class of bug #54 (PR-already-exists
# on retry) at the source.
#
# STATUS: M4 = ADDITIVE ONLY. This workflow has NO automated trigger in M4.
# It can only run via workflow_dispatch (manual smoke test). M6 will wire
# the real trigger (workflow_run: completed on code-generate.yml).
# The existing `develop.yml` remains authoritative until M6.
#
# RESPONSIBILITIES (single):
#   - Push head branch (CLAUDE_DEV_PAT, no force)
#   - Open PR if none exists, or reuse existing PR (idempotent — issue #54)
#   - Post audit comment on issue with PR URL
#
# SECURITY (S1-S7 preserved):
#   - S7 pipeline-fix: classic PAT's `workflow` scope authenticates the push
#     via extraheader (actions/checkout credential helper is insufficient)
#   - S3: base-branch is never main/master (enforced in code-generate)
#   - S2: no label application here — label transitions are the caller's job
#
# Manual smoke test:
#   gh workflow run pr-lifecycle.yml \
#     -f issue-number=NN \
#     -f head-branch=claude/issue-NN-slug \
#     -f base-branch=dev \
#     -f commit-sha=<sha> \
#     -f summary="<text>"

name: pr-lifecycle

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: "Issue number"
        required: true
        type: string
      head-branch:
        description: "Head branch to push (from code-generate)"
        required: true
        type: string
      base-branch:
        description: "Base branch (PR target — must NOT be main/master)"
        required: true
        type: string
      commit-sha:
        description: "Head commit SHA (from code-generate)"
        required: true
        type: string
      summary:
        description: "Change summary for PR body"
        required: false
        type: string
        default: "(no summary provided)"
  workflow_run:
    workflows: [code-generate]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: pr-lifecycle-run-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  push-and-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.CLAUDE_DEV_PAT }}

      - name: Resolve inputs (dispatch or workflow_run artifact)
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_ISSUE: ${{ inputs.issue-number }}
          DISPATCH_HEAD: ${{ inputs.head-branch }}
          DISPATCH_BASE: ${{ inputs.base-branch }}
          DISPATCH_SHA: ${{ inputs.commit-sha }}
          DISPATCH_SUMMARY: ${{ inputs.summary }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            issue_number="$DISPATCH_ISSUE"
            head_branch="$DISPATCH_HEAD"
            base_branch="$DISPATCH_BASE"
            commit_sha="$DISPATCH_SHA"
            summary="${DISPATCH_SUMMARY:-(no summary provided)}"
          else
            if [ -z "$WORKFLOW_RUN_ID" ]; then
              echo "::error::workflow_run event missing workflow_run.id"
              exit 1
            fi
            mkdir -p ./.github/artifacts
            gh run download "$WORKFLOW_RUN_ID" \
              --repo "$GITHUB_REPOSITORY" \
              --name code-generate-outputs \
              --dir ./.github/artifacts || {
                echo "::warning::code-generate-outputs artifact not found in upstream run $WORKFLOW_RUN_ID. Skipping."
                exit 0
              }
            issue_number=$(jq -r '.issue_number // ""' ./.github/artifacts/code-generate-outputs.json)
            head_branch=$(jq -r '.branch_name // ""' ./.github/artifacts/code-generate-outputs.json)
            commit_sha=$(jq -r '.commit_sha // ""' ./.github/artifacts/code-generate-outputs.json)
            summary=$(jq -r '.summary // "(no summary provided)"' ./.github/artifacts/code-generate-outputs.json)
            base_branch=$(jq -r '.base_branch // "dev"' ./.github/artifacts/code-generate-outputs.json)
            if [ -z "$issue_number" ] || [ -z "$head_branch" ] || [ -z "$commit_sha" ]; then
              echo "::warning::Incomplete code-generate-outputs artifact; skipping."
              exit 0
            fi
          fi
          {
            echo "issue-number=$issue_number"
            echo "head-branch=$head_branch"
            echo "base-branch=$base_branch"
            echo "commit-sha=$commit_sha"
            echo "summary=$summary"
          } >> "$GITHUB_OUTPUT"

      - name: Open/reuse PR (CLAUDE_DEV_PAT)
        id: pr
        if: steps.resolve.outputs.issue-number != ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_DEV_PAT }}
          HEAD: ${{ steps.resolve.outputs.head-branch }}
          BASE: ${{ steps.resolve.outputs.base-branch }}
          SHA: ${{ steps.resolve.outputs.commit-sha }}
          SUMMARY: ${{ steps.resolve.outputs.summary }}
          NUMBER: ${{ steps.resolve.outputs.issue-number }}
        run: |
          set -euo pipefail
          if [ "$BASE" = "main" ] || [ "$BASE" = "master" ]; then
            echo "::error::Refusing to open PR against $BASE (PRD §7 S3)"
            exit 1
          fi
          # Issue #148: the v1-era `git push origin "$HEAD"` was removed.
          # code-generate.yml (PR #146, L395-418) now owns the head-branch
          # push and runs BEFORE this workflow. The runner's local checkout
          # is on `dev`, so `git push origin claude/issue-N-...` failed with
          # "src refspec does not match any". `gh pr create --head` operates
          # on the remote ref directly — no local branch needed.

          body=$(cat <<EOF
          I'm an AI assistant (powered by Claude) operating under the GithubAutoDev disclosure policy.

          ## Summary
          $SUMMARY

          ## Issue
          Closes #$NUMBER

          ## Test plan
          - [ ] CI green
          - [ ] Reviewer verifies scope matches issue acceptance criteria
          - [ ] No regressions in adjacent modules

          _Branch: \`$HEAD\` @ \`${SHA:0:12}\`_
          EOF
          )

          # Idempotent PR open (issue #54): on retry the PR already exists.
          pr_url=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --head "$HEAD" --base "$BASE" --state open \
            --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -z "$pr_url" ]; then
            pr_url=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE" \
              --head "$HEAD" \
              --title "[Issue #$NUMBER]" \
              --body "$body")
            echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"
            gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" \
              --body "🚀 Development branch pushed: \`$HEAD\` @ \`${SHA:0:12}\`. PR: $pr_url"
          else
            echo "Reusing existing PR: $pr_url"
            echo "pr-url=$pr_url" >> "$GITHUB_OUTPUT"
            gh pr comment "$pr_url" --repo "$GITHUB_REPOSITORY" \
              --body "🔄 **Retry attempt** — new push: \`$HEAD\` @ \`${SHA:0:12}\`."
          fi

          # Apply `in-review` label so Module 8 (review.yml) and Module 9
          # (merge-queue.yml) engage. GH_TOKEN is CLAUDE_DEV_PAT (see env above)
          # — PAT-sourced label events fire downstream workflows, whereas
          # GITHUB_TOKEN-sourced events do not.
          gh pr edit "$pr_url" --repo "$GITHUB_REPOSITORY" --add-label "in-review"

  on-failure:
    needs: push-and-pr
    if: ${{ always() && needs.push-and-pr.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Resolve issue number for failure comment
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_ISSUE: ${{ inputs.issue-number }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          number=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            number="$DISPATCH_ISSUE"
          elif [ -n "$WORKFLOW_RUN_ID" ]; then
            mkdir -p ./.github/artifacts
            gh run download "$WORKFLOW_RUN_ID" --repo "$GITHUB_REPOSITORY" \
              --name code-generate-outputs --dir ./.github/artifacts 2>/dev/null || true
            if [ -f ./.github/artifacts/code-generate-outputs.json ]; then
              number=$(jq -r '.issue_number // ""' ./.github/artifacts/code-generate-outputs.json)
            fi
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Mark stage:failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.resolve.outputs.number }}
        run: |
          if [ -z "$NUMBER" ]; then
            echo "::warning::No issue number on this event."
            exit 0
          fi
          gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "stage:failed" || true
          gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "⚠️ pr-lifecycle failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." || true
