# CodeQL baseline analysis.
# Security foundation for a repo that accepts untrusted input via Issues.
# PRD §7 (security red lines) — this workflow is the detection layer for
# accidental vulnerabilities introduced by AI-generated code in modules 4-9.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # weekly, off the :00 mark per scheduler etiquette

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
        # rust added once rust/ source tree lands
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
