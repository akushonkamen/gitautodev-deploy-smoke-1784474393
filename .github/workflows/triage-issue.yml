# Triage Issue — minimal viable Issue → Claude → Reply/Work loop.
#
# Listens for new issues, dispatches claude (or GLM via base-url passthrough)
# to analyze the issue body, then posts claude's comment verbatim. Routes
# `work` decisions by `workload_class` (M8 of pipeline-redesign-v3):
#   - trivial | standard → apply `accepted-by-claude` (S2 amendment, low-risk)
#   - complex            → apply `needs-clarify`        (clarify loop engages)
# The legacy `AUTO_ACCEPT_ENABLED` repo var was removed in M8 — routing is now
# per-issue via workload classification, not a global toggle.
#
# SECURITY (PRD §7 S1): this workflow consumes untrusted Issue body content.
#   permissions:
#     contents: read        # only reads CLAUDE.md / prompts
#     issues:   write       # posts comment, applies triage/accepted labels
#   NEVER add `contents: write`. A prompt-injection in an Issue body must not
#   escalate to repo writes.
#
# Engine: claude-code-action@v1 with ANTHROPIC_BASE_URL passthrough.
#   - Set LLM_API_KEY + base url vars → routes to any Anthropic-compatible
#     endpoint (e.g. GLM at https://open.bigmodel.cn/api/anthropic with model "glm-5.2").
name: triage-issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue-number:
        description: "Issue number to triage (manual test)"
        required: true
        type: string

# Default least-privilege. Each job repeats these explicitly so any single
# job's security posture can be read in isolation.
permissions:
  contents: read
  issues: write

# Single in-flight run per issue — duplicate triggers queue, don't clobber.
concurrency:
  group: triage-issue-${{ github.event.issue.number || github.event.inputs.issue-number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      # claude-code-action@v1 internal reads `env.ANTHROPIC_BASE_URL` (see
      # anthropics/claude-code-action action.yml line 331), which is the
      # JOB-LEVEL env context — step-level env in .github/actions/triage
      # action.yml does NOT propagate. Without this, the SDK call defaults
      # to https://api.anthropic.com and the GLM passthrough key gets 401.
      # See issue #131 root-cause analysis (2026-07-13).
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    outputs:
      decision: ${{ steps.triage.outputs.decision }}
      comment-body: ${{ steps.triage.outputs.comment_body }}
      suggested-labels: ${{ steps.triage.outputs.suggested_labels }}
      confidence: ${{ steps.triage.outputs.confidence }}
      workload-class: ${{ steps.triage.outputs.workload_class }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve issue number
        id: resolve-issue
        run: |
          num="${{ github.event.issue.number || github.event.inputs.issue-number }}"
          if [ -z "$num" ]; then
            echo "::error::No issue number (event=$GITHUB_EVENT_NAME)"
            exit 1
          fi
          echo "issue-number=$num" >> "$GITHUB_OUTPUT"

      # Composite action returns decision + comment_body + suggested_labels + confidence.
      # It does NOT post the comment — that's this workflow's job.
      - name: Run triage (claude / GLM via base-url passthrough)
        id: triage
        uses: ./.github/actions/triage
        with:
          issue-number: ${{ steps.resolve-issue.outputs.issue-number }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.LLM_API_KEY }}
          api-key-backup: ${{ secrets.LLM_API_KEY_BACKUP }}
          anthropic-base-url: ${{ vars.ANTHROPIC_BASE_URL }}
          model: ${{ vars.TRIAGE_MODEL }}
          engine: claude
          max-turns: 6

      # Post claude's comment verbatim. S1-safe: issues:write only.
      - name: Post triage comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.resolve-issue.outputs.issue-number }}
          COMMENT_BODY: ${{ steps.triage.outputs.comment_body }}
        run: |
          set -euo pipefail
          printf '%s\n' "$COMMENT_BODY" | gh issue comment "$NUMBER" --body-file -

      # Always apply the `triage` label so downstream modules know triage ran.
      - name: Apply triage label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ steps.resolve-issue.outputs.issue-number }}
        run: gh issue edit "$NUMBER" --add-label triage

      # ─── M8 routing: workload_class drives the path forward ────────────────
      # Spec pipeline-redesign-v3 §4.3 — trivial/standard are auto-accepted via
      # the S2 amendment (Claude self-acceptance label); complex goes through
      # the clarify loop for deeper scoping. AUTO_ACCEPT_ENABLED repo var was
      # removed entirely; per-issue classification replaces the global toggle.
      #
      # v2 lifecycle note: `needs-ralph` is never emitted here. The only emitter
      # of `needs-ralph` is clarify-loop's max-rounds fallback.
      - name: Route by workload_class (M8)
        id: route
        if: ${{ steps.triage.outputs.decision == 'work' }}
        env:
          # S7 pipeline-fix (2026-07-07): use CLAUDE_DEV_PAT so label events
          # fire downstream workflows (clarify-loop.yml, develop-gate.yml).
          GH_TOKEN: ${{ secrets.CLAUDE_DEV_PAT }}
          NUMBER: ${{ steps.resolve-issue.outputs.issue-number }}
          WORKLOAD: ${{ steps.triage.outputs.workload_class }}
        run: |
          set -eu
          case "${WORKLOAD:-standard}" in
            trivial|standard)
              gh issue edit "$NUMBER" --add-label accepted-by-claude
              gh issue comment "$NUMBER" --body "🤖 Claude self-acceptance (M8 workload=$WORKLOAD). \`accepted-by-claude\` applied — Module 4 develop-gate will pick this up. Maintainer may override with \`rejected\`."
              echo "auto-accepted=true" >> "$GITHUB_OUTPUT"
              ;;
            complex)
              gh issue edit "$NUMBER" --add-label needs-clarify
              gh issue comment "$NUMBER" --body "🔬 Claude classified this as **complex** — Module 3' clarify loop will engage to scope the work before acceptance."
              echo "auto-accepted=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # Fallback for empty/unexpected workload: safer to clarify.
              gh issue edit "$NUMBER" --add-label needs-clarify
              gh issue comment "$NUMBER" --body "⏳ Claude recommends development (workload unset). Module 3' clarify loop will engage to confirm scope."
              echo "auto-accepted=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      # M8 amendment (pipeline-fix 2026-07-13): when triage auto-applies
      # `accepted-by-claude` for trivial/standard workload, the issue skips
      # clarify-loop and goes straight to Module 4. But develop-gate is
      # triggered via `workflow_run` and consumes an `issue-context` artifact
      # uploaded by the upstream workflow. clarify-loop.yml uploads it (L338);
      # triage-issue.yml did NOT, causing develop-gate preflight to bail with
      # "issue-context artifact not found" for every M8-routed issue.
      # This step mirrors clarify-loop's artifact contract for the M8 path.
      - name: M8 — emit issue-context artifact for develop-gate
        if: ${{ steps.route.outputs.auto-accepted == 'true' }}
        env:
          NUMBER: ${{ steps.resolve-issue.outputs.issue-number }}
        run: |
          set -eu
          mkdir -p ./.github/artifacts
          jq -n \
            --arg issue_number "$NUMBER" \
            --arg decision "work" \
            --arg source "triage-issue" \
            '{issue_number: $issue_number, decision: $decision, source: $source}' \
            > ./.github/artifacts/issue-context.json
          cat ./.github/artifacts/issue-context.json

      - uses: actions/upload-artifact@v7
        if: ${{ steps.route.outputs.auto-accepted == 'true' }}
        with:
          name: issue-context
          path: ./.github/artifacts/issue-context.json
          retention-days: 1

  # Failure path: post a stage:failed comment and label, do not block other issues.
  # PRD §6 graceful degradation.
  on-failure:
    needs: triage
    if: ${{ always() && needs.triage.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Mark stage:failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number || github.event.inputs.issue-number }}
        run: |
          if [ -z "$NUMBER" ]; then
            echo "::warning::Cannot post stage:failed — no issue number on this event."
            exit 0
          fi
          gh issue edit "$NUMBER" --add-label "stage:failed" || true
          gh issue comment "$NUMBER" --body "⚠️ Triage failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. A maintainer will triage manually." || true
