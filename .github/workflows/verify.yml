# Module 5 — Verify (M5 of pipeline-redesign-v3, cutover LIVE)
#
# Purpose: single verification gate with multiple oracles. Replaces the legacy
# self-verify.yml as the authoritative label owner. test.yml (M6) remains a
# separate downstream workflow triggered by the `verified` label this workflow
# emits.
#
# STATUS: CUTOVER LIVE. This workflow:
#   - applies `verifying` at start (replaces self-verify.yml step)
#   - runs 2 oracles in parallel (smoke + targeted)
#   - aggregates AND verdict
#   - on pass: applies `verified` (triggers test.yml / Module 6)
#   - on fail: applies `verify:failed`
# self-verify.yml was deleted in the cutover PR.
#
# ORACLES:
#   - smoke       : detect manifest (package.json | Cargo.toml) and run its test target
#   - targeted    : invoke ./.github/actions/self-verify (structured verification)
#   - aggregate   : verdict = passed iff targeted passes AND smoke does not fail (smoke may skip)
#
# test.yml (Module 6) owns the full adversarial test composite after `verified`
# is applied; verify.yml intentionally does NOT call .github/actions/test to
# avoid duplicate work within a single issue lifecycle.
#
# RETRY STORAGE (spec §4.4):
#   Read-only: .github/.verify-state.json on head branch carries attempt
#   count. verify.yml surfaces it in the summary comment.
#
# SECURITY (PRD §7):
#   - S1: contents:read + issues:write + pull-requests:write (NO contents:write)
#   - S3: trigger is pull_request on dev only (never main)
#   - S4: LLM_API_KEY never printed (existence check only, like code-generate)
#   - S5: composite actions enforce their own --allowedTools; no bypass here
#   - S7: scoped to .github/workflows/verify.yml (pipeline-fix sanctioned)
#
# Triggers:
#   - pull_request opened/synchronize on dev, head matching claude/issue-*

name: verify

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - dev

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  filter:
    if: ${{ startsWith(github.head_ref, 'claude/issue-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      issue-number: ${{ steps.extract.outputs.issue-number }}
      should-run: ${{ steps.extract.outputs.should-run }}
      attempt: ${{ steps.state.outputs.attempt }}
      max: ${{ steps.state.outputs.max }}
    steps:
      - name: Extract issue number from head ref
        id: extract
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -eu
          number=$(printf '%s' "$HEAD_REF" | sed -nE 's|^claude/issue-([0-9]+)-.*|\1|p')
          if [ -z "$number" ]; then
            echo "::warning::Head ref does not match claude/issue-N-* pattern: $HEAD_REF"
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "issue-number=" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "issue-number=$number" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.extract.outputs.should-run == 'true'
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: "Read retry state (M5: read-only)"
        id: state
        if: steps.extract.outputs.should-run == 'true'
        shell: bash
        run: |
          set -eu
          state_file=".github/.verify-state.json"
          attempt=1
          max_attempts=3
          if [ -f "$state_file" ]; then
            attempt=$(jq -r '.attempt // 1' "$state_file" 2>/dev/null || echo 1)
            max_attempts=$(jq -r '.max // 3' "$state_file" 2>/dev/null || echo 3)
            case "$attempt" in
              ''|*[!0-9]*) attempt=1 ;;
            esac
            case "$max_attempts" in
              ''|*[!0-9]*) max_attempts=3 ;;
            esac
          fi
          echo "attempt=$attempt" >> "$GITHUB_OUTPUT"
          echo "max=$max_attempts" >> "$GITHUB_OUTPUT"

      - name: Apply verifying label on issue (cutover)
        if: steps.extract.outputs.should-run == 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_DEV_PAT }}
          NUMBER: ${{ steps.extract.outputs.issue-number }}
        run: |
          set -eu
          # CLAUDE_DEV_PAT so the verified label event below fires test.yml.
          gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "verifying" || true

  smoke:
    needs: filter
    if: needs.filter.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # PR #138 root cause: claude-code-action@v1 reads env.ANTHROPIC_BASE_URL
      # at the JOB level. Step-level env on composite actions does NOT
      # propagate to the SDK call. Without this, SDK defaults to
      # api.anthropic.com and GLM passthrough key gets 401.
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    outputs:
      verdict: ${{ steps.run.outputs.verdict }}
      manifest: ${{ steps.detect.outputs.manifest }}
      log-tail: ${{ steps.run.outputs.log-tail }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Detect project manifest
        id: detect
        run: |
          set -eu
          manifest="none"
          if [ -f package.json ]; then manifest="npm"; fi
          if [ -f Cargo.toml ]; then manifest="cargo"; fi
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"
          echo "Detected manifest: $manifest"

      - name: "Verify LLM_API_KEY (S4: never print value)"
        shell: bash
        run: |
          if [ -z "${{ secrets.LLM_API_KEY }}" ]; then
            echo "::warning::LLM_API_KEY not set (smoke oracle does not use it, but downstream oracles do)."
          fi

      - name: Run smoke oracle
        id: run
        env:
          MANIFEST: ${{ steps.detect.outputs.manifest }}
        run: |
          set -uo pipefail
          verdict="skip"
          log_tail="(no manifest — skipped)"
          if [ "$MANIFEST" = "npm" ]; then
            log_file="$(mktemp)"
            if npm ci --no-audit --no-fund >"$log_file" 2>&1 && npm test >"$log_file" 2>&1; then
              verdict="pass"
            else
              verdict="fail"
            fi
            log_tail="$(tail -n 40 "$log_file" || true)"
            rm -f "$log_file"
          elif [ "$MANIFEST" = "cargo" ]; then
            log_file="$(mktemp)"
            if cargo test --lib >"$log_file" 2>&1; then
              verdict="pass"
            else
              verdict="fail"
            fi
            log_tail="$(tail -n 40 "$log_file" || true)"
            rm -f "$log_file"
          fi
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          {
            echo "log-tail<<EOF"
            echo "$log_tail"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  targeted:
    needs: filter
    if: needs.filter.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      # PR #138 root cause: claude-code-action@v1 reads env.ANTHROPIC_BASE_URL
      # at the JOB level. Step-level env on composite actions does NOT
      # propagate to the SDK call. Without this, SDK defaults to
      # api.anthropic.com and GLM passthrough key gets 401.
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    outputs:
      verdict: ${{ steps.norm.outputs.verdict }}
      report: ${{ steps.invoke.outputs.verify-report }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Invoke self-verify composite
        id: invoke
        uses: ./.github/actions/self-verify
        with:
          issue-number: ${{ needs.filter.outputs.issue-number }}
          head-branch: ${{ github.head_ref }}
          base-branch: ${{ github.base_ref }}
          pr-url: ${{ github.event.pull_request.html_url }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          api-key: ${{ secrets.LLM_API_KEY }}
          api-key-backup: ${{ secrets.LLM_API_KEY_BACKUP }}
          anthropic-base-url: ${{ vars.ANTHROPIC_BASE_URL }}
          model: ${{ vars.SELF_VERIFY_MODEL }}
          max-turns: ${{ vars.SELF_VERIFY_MAX_TURNS || '10' }}
          context-budget-paths: ${{ vars.SELF_VERIFY_CONTEXT_PATHS || '' }}
          issue-language: "en"

      - name: Normalize verdict
        id: norm
        env:
          STATUS: ${{ steps.invoke.outputs.verify-status }}
        run: |
          case "$STATUS" in
            passed) echo "verdict=pass" >> "$GITHUB_OUTPUT" ;;
            failed) echo "verdict=fail" >> "$GITHUB_OUTPUT" ;;
            *) echo "::warning::unexpected verify-status '$STATUS'"; echo "verdict=fail" >> "$GITHUB_OUTPUT" ;;
          esac

  aggregate:
    needs: [filter, smoke, targeted]
    if: always() && needs.filter.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    outputs:
      verdict: ${{ steps.verdict.outputs.verdict }}
    steps:
      - name: Compute AND verdict
        id: verdict
        env:
          SMOKE: ${{ needs.smoke.outputs.verdict }}
          TARGETED: ${{ needs.targeted.outputs.verdict }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          TARGETED_RESULT: ${{ needs.targeted.result }}
        run: |
          set -u
          targeted_verdict="${TARGETED:-fail}"
          if [ "$TARGETED_RESULT" != "success" ]; then targeted_verdict="fail"; fi

          smoke_verdict="${SMOKE:-skip}"
          if [ "$SMOKE_RESULT" != "success" ]; then smoke_verdict="fail"; fi

          if [ "$targeted_verdict" = "pass" ] && [ "$smoke_verdict" != "fail" ]; then
            echo "verdict=passed" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "smoke=$smoke_verdict targeted=$targeted_verdict"

      - name: Post verify summary on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          SMOKE: ${{ needs.smoke.outputs.verdict }}
          MANIFEST: ${{ needs.smoke.outputs.manifest }}
          TARGETED: ${{ needs.targeted.outputs.verdict }}
          ATTEMPT: ${{ needs.filter.outputs.attempt }}
          MAX: ${{ needs.filter.outputs.max }}
          ISSUE: ${{ needs.filter.outputs.issue-number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          icon="✅"
          if [ "$VERDICT" = "failed" ]; then icon="❌"; fi
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(cat <<EOF
          $icon **verify.yml — \`$VERDICT\`**

          | Oracle | Verdict |
          |---|---|
          | smoke ($MANIFEST) | \`$SMOKE\` |
          | targeted (self-verify) | \`$TARGETED\` |

          | Meta | Value |
          |---|---|
          | Issue | #$ISSUE |
          | Attempt | $ATTEMPT/$MAX |
          | Workflow run | $RUN_URL |
          EOF
          )"

      - name: Transition labels (pass → verified, fail → verify:retry-N or stage:failed)
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_DEV_PAT }}
          NUMBER: ${{ needs.filter.outputs.issue-number }}
          VERDICT: ${{ steps.verdict.outputs.verdict }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERIFY_RETRY_MAX: ${{ vars.VERIFY_RETRY_MAX || '3' }}
        run: |
          set -eu
          # Remove verifying intermediate label either way.
          gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "verifying" || true

          if [ "$VERDICT" = "passed" ]; then
            # CLAUDE_DEV_PAT so the label event fires test.yml (Module 6).
            gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "verified"
            gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" --body "✅ **Verify passed** — Module 6 (test) engaged. PR: $PR_URL"
            exit 0
          fi

          # Verdict = failed → calculate retry counter from existing verify:retry-N labels.
          # Mirror test:retry-N (Module 6) and review:retry-N (Module 8, PR #122) pattern.
          labels=$(gh issue view "$NUMBER" --repo "$GITHUB_REPOSITORY" --json labels --jq '.labels | map(.name) | join(",")')
          retry_count=0
          if printf '%s' "$labels" | grep -q "verify:retry-3"; then retry_count=3; fi
          if [ "$retry_count" -eq 0 ] && printf '%s' "$labels" | grep -q "verify:retry-2"; then retry_count=2; fi
          if [ "$retry_count" -eq 0 ] && printf '%s' "$labels" | grep -q "verify:retry-1"; then retry_count=1; fi

          max="${VERIFY_RETRY_MAX:-3}"
          echo "retry_count=$retry_count max=$max"

          if [ "$retry_count" -ge "$max" ]; then
            # Max retries exhausted — escalate to maintainer.
            gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "stage:failed" || true
            gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(cat <<EOF
          ❌ **Verify retries exhausted (${retry_count}/${max})**

          Module 5 failed ${retry_count} time(s). The pipeline cannot automatically recover.
          A maintainer must triage manually.

          | Field | Value |
          |---|---|
          | PR | ${PR_URL} |
          | Last workflow run | ${RUN_URL} |
          | Retry labels | ${labels} |
          EOF
          )"
            exit 0
          fi

          next=$((retry_count + 1))
          # Clean up prior verify:retry-N labels so only the latest counter remains.
          for old_n in 1 2 3 4 5; do
            [ "$old_n" = "$next" ] && continue
            gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --remove-label "verify:retry-$old_n" 2>/dev/null || true
          done
          gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "verify:retry-${next}"

          # Post audit comment with retry count + run URL — code-generate.yml
          # parses this comment body to reconstruct prior-verify-report for Claude.
          gh issue comment "$NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(cat <<EOF
          🔄 **Verify retry ${next}/${max}**

          | Field | Value |
          |---|---|
          | Retry | ${next} of ${max} |
          | PR | ${PR_URL} |
          | Prior workflow run | ${RUN_URL} |
          | Retry label | verify:retry-${next} |

          ---
          code-generate.yml will auto-trigger on the \`verify:retry-${next}\` label,
          fetch this comment as the prior-verify-report, and re-run Module 4 to
          address the verify failure.
          EOF
          )"

  on-failure:
    needs: [smoke, targeted, aggregate]
    if: always() && (needs.smoke.result == 'failure' || needs.targeted.result == 'failure' || needs.aggregate.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post infrastructure-failure notice on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -eu
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$(cat <<EOF
          ⚠️ **verify.yml (M5) infrastructure failure**

          One of the oracle jobs failed to execute (engine or composite-action error, not a verdict failure).

          [Workflow run]($RUN_URL)
          EOF
          )"
