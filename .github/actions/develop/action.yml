# Composite action: Module 4 (develop, v2)
# PRD §2 module 4 + plan §7 S2 amendment. SECURITY: triggered by `accepted`
# OR `accepted-by-claude` label (PRD §7 S2 + S2 amendment).
#
# REQUIRED PERMISSIONS (caller workflow must grant):
#   contents: write      (branch creation, commits)  -- S3: only on feat/claude/* branches
#   issues:   write      (post audit, transition stage label)
#   pull-requests: write (open PR)
#
# S3 ENFORCEMENT: base-branch MUST NOT be `main`/`master`. The first step
# refuses to operate if a protected branch is named. claude's --disallowedTools
# blocks `git push --force*` and any push to main/master wholesale.
#
# v2 CHANGES (plan §7 S2 amendment):
#   - adds anthropic-base-url input for GLM passthrough
#   - tolerant JSON parsing via .github/actions/develop/extract.sh
#     (PR #143: GLM passthrough does not honor --json-schema strict mode;
#      reads assistant text from execution_file and parses with fallback)
#   - --disallowedTools includes Bash(git push --force*), Bash(git push * --force*),
#     Bash(git checkout main*), Bash(git push * main*), Bash(git push * master*)
#   - PR opened by caller workflow with CLAUDE_DEV_PAT (PR author = PAT owner)
#   - disclosure preamble for the PR body (AC-V2-15 style)

name: "Module 4 — Develop"
description: "Implement accepted issue: claude writes code on feature branch, returns branch+sha for caller to push and open PR."

inputs:
  issue-number:
    description: "Issue number"
    required: true
  base-branch:
    description: "Branch to develop from — MUST NOT be a protected branch (PRD §7 S3, enforced below)"
    required: false
    default: "dev"
  head-branch:
    description: "Branch to create and commit onto (e.g. claude/issue-N-slug)"
    required: true
  repo-token:
    description: "GITHUB_TOKEN (issues:read for context fetch)"
    required: true
  api-key:
    description: "Engine provider API key (ZHIPU_API_KEY for GLM passthrough)"
    required: true
  api-key-backup:
    description: "Backup API key for 429 quota-exhaustion fallback (LLM_API_KEY_BACKUP). Empty disables retry."
    required: false
    default: ""
  anthropic-base-url:
    description: "Anthropic-compatible API base URL. Empty = Anthropic default."
    required: false
    default: ""
  engine:
    description: "LLM engine (claude | codex). Default: claude"
    required: false
    default: "claude"
  model:
    description: "Model ID override. Empty = engine default."
    required: false
    default: ""
  max-turns:
    description: "Agent turn cap (PRD §5)"
    required: false
    default: "20"
  context-budget-paths:
    description: "Path allowlist — limit reads (PRD §5)"
    required: false
    default: ""
  issue-language:
    description: "Detected dominant natural language of the issue body (e.g. 'zh', 'en')."
    required: false
    default: "en"
  prior-test-report:
    description: "Prior Module 6 test report from a previous failed run (retry path). Empty = first attempt."
    required: false
    default: ""

outputs:
  branch-name:
    description: "Branch claude committed onto"
    value: ${{ steps.emit.outputs.branch-name }}
  commit-sha:
    description: "Head commit SHA claude produced"
    value: ${{ steps.emit.outputs.commit-sha }}
  summary:
    description: "One-paragraph change summary for the PR body"
    value: ${{ steps.emit.outputs.summary }}
  pr-language:
    description: "Language claude wrote the PR body in (matches issue-language when possible)"
    value: ${{ steps.emit.outputs.pr-language }}

runs:
  using: composite
  steps:
    - name: Refuse to operate on main (PRD §7 S3)
      shell: bash
      env:
        BASE: ${{ inputs.base-branch }}
        HEAD: ${{ inputs.head-branch }}
      run: |
        set -eu
        for forbidden in main master; do
          if [ "$BASE" = "$forbidden" ]; then
            echo "::error::Refusing to develop against $BASE (PRD §7 S3 — AI never writes to main). Set base-branch to a non-main ref."
            exit 1
          fi
          if [ "$HEAD" = "$forbidden" ]; then
            echo "::error::Refusing to use $HEAD as head branch (PRD §7 S3)."
            exit 1
          fi
        done

    - name: Fetch issue context
      id: issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.repo-token }}
        NUMBER: ${{ inputs.issue-number }}
      run: |
        set -eu
        json=$(gh issue view "$NUMBER" --repo "$GITHUB_REPOSITORY" --json title,body,labels,url)
        title=$(printf '%s' "$json" | jq -r '.title')
        body=$(printf '%s' "$json"  | jq -r '.body // "(empty)"')
        url=$(printf '%s' "$json"   | jq -r '.url')
        {
          echo "title<<TITLE_EOF"
          printf '%s\n' "$title"
          echo "TITLE_EOF"
          echo "url=$url"
          echo "body<<BODY_EOF"
          printf '%s\n' "$body"
          echo "BODY_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build claude config (settings + disallowed)
      id: cfg
      shell: bash
      env:
        MODEL_INPUT: ${{ inputs.model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        CONTEXT_PATHS: ${{ inputs.context-budget-paths }}
      run: |
        set -eu
        if [ -n "$MODEL_INPUT" ]; then
          settings=$(jq -c -n \
            --arg m "$MODEL_INPUT" \
            --argjson t "$MAX_TURNS" \
            '{permissions:{allow:["Read","Grep","Glob","Write","Edit","Bash(git status:*)","Bash(git diff:*)","Bash(git log:*)","Bash(git add:*)","Bash(git commit:*)","Bash(git checkout:*)","Bash(git switch:*)","Bash(git restore:*)"],deny:["Bash(git push:*)","Bash(git checkout main*)","Bash(git checkout master*)","Bash(git reset --hard*)"]}, maxTurns:$t, model:$m}')
        else
          settings=$(jq -c -n \
            --argjson t "$MAX_TURNS" \
            '{permissions:{allow:["Read","Grep","Glob","Write","Edit","Bash(git status:*)","Bash(git diff:*)","Bash(git log:*)","Bash(git add:*)","Bash(git commit:*)","Bash(git checkout:*)","Bash(git switch:*)","Bash(git restore:*)"],deny:["Bash(git push:*)","Bash(git checkout main*)","Bash(git checkout master*)","Bash(git reset --hard*)"]}, maxTurns:$t}')
        fi
        {
          echo "settings<<SETTINGS_EOF"
          echo "$settings"
          echo "SETTINGS_EOF"
        } >> "$GITHUB_OUTPUT"

        # AC: never force-push, never push to main/master (defense in depth — claude
        # is also denied all `git push` wholesale via settings.permissions.deny above).
        disallowed="Bash(git push --force*),Bash(git push * --force*),Bash(git push *--force*),Bash(git push origin main*),Bash(git push origin master*),Bash(git checkout main),Bash(git checkout master)"
        echo "disallowed=${disallowed}" >> "$GITHUB_OUTPUT"

        if [ -n "$CONTEXT_PATHS" ]; then
          echo "context_paths=$CONTEXT_PATHS" >> "$GITHUB_OUTPUT"
        else
          echo "context_paths=" >> "$GITHUB_OUTPUT"
        fi

    - name: Develop via Claude (or GLM via base-url passthrough)
      if: inputs.engine == 'claude'
      id: claude-run
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
      with:
        anthropic_api_key: ${{ inputs.api-key }}
        github_token: ${{ inputs.repo-token }}
        prompt: |
          You are the develop module of the GithubAutoDev pipeline (Module 4, v2).

          Issue #${{ inputs.issue-number }}: ${{ steps.issue.outputs.title }}
          URL: ${{ steps.issue.outputs.url }}
          Detected issue language: ${{ inputs.issue-language }}
          Base branch: ${{ inputs.base-branch }} (DO NOT push to it)
          Head branch: ${{ inputs.head-branch }} (already checked out — commit here)

          Issue body:
          ```
          ${{ steps.issue.outputs.body }}
          ```
          ${{ inputs.prior-test-report != '' && '
          ## Prior test feedback (retry attempt)

          The previous Module 6 test run on this issue failed. The test report is
          included below. Review it carefully and fix the issues identified before
          committing. This is a retry — the prior implementation did not pass tests.

          ---

          ' || '' }}${{ inputs.prior-test-report }}

          ## Task
          Implement the issue on the head branch (already checked out for you).
          Make the smallest change that satisfies the issue. Write code, tests if
          applicable, and a brief implementation summary.

          ## Hard rules
          1. **Never push.** The caller workflow pushes and opens the PR. Your
             `settings.permissions.deny` list blocks `Bash(git push:*)` wholesale. You only commit.
          2. **Never check out main/master.** Stay on ${{ inputs.head-branch }}.
          3. **Never force-push, never reset --hard** (PRD §6 idempotency + §7 S3).
          4. **Match the natural language of the issue body** for any code comments,
             commit messages, and the implementation summary. Detected: ${{ inputs.issue-language }}.
             Technical identifiers (API names, library names) stay in their original language.
          5. **Context budget (PRD §5)**: only read directories named in the issue or
             CLAUDE.md${{ steps.cfg.outputs.context_paths && format('. Allowed paths: {0}', steps.cfg.outputs.context_paths) || '' }}. Do NOT scan the whole repo.
          6. **Never print tokens, API keys, or environment values** (PRD §7 S4).
          7. **Disclosure (AC-V2-15)**: your summary will appear in the PR body; the
             PR body is decorated by the caller workflow with the AI disclosure preamble.

          ## Output protocol (mandatory)

          Output ONLY a single JSON object on ONE line. No prose around it,
          no markdown fences, no hidden HTML comments. The downstream parser
          tolerates accidental wrapping but you should aim for one line.

          Schema:
          {"summary":"<one-paragraph change summary for the PR body, in the issue's language, >= 10 chars>","language":"<the language you wrote in: zh|en|ja|ko|es|fr|de|ru|pt|other>"}

          Field rules:
          - summary: >= 10 chars, plain text or markdown, will appear in PR body
          - language: exactly one of zh|en|ja|ko|es|fr|de|ru|pt|other
          - No trailing commas, no JSON comments, no surrounding text

          Respond with the JSON object only.
        settings: ${{ steps.cfg.outputs.settings }}
        # PR #143 follow-up: dropped claude_args entirely. The settings JSON
        # already carries permissions.deny=[Bash(git push:*), Bash(git checkout
        # main*), Bash(git checkout master*), Bash(git reset --hard*)], which
        # is strictly more comprehensive than the --disallowedTools list and
        # avoids the spaces-in-args shell-split bug that crashed the CLI on
        # startup (run 29244145735: "Claude Code process exited with code 1").

    - name: Detect 429 quota exhaustion (primary key)
      id: detect-429
      if: always()
      shell: bash
      env:
        EXEC_FILE: ${{ steps.claude-run.outputs.execution_file }}
      run: |
        set -uo pipefail
        needs_retry="false"
        if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
          if grep -qE '"is_error"[[:space:]]*:[[:space:]]*true' "$EXEC_FILE" 2>/dev/null \
             && grep -q '429' "$EXEC_FILE" 2>/dev/null; then
            needs_retry="true"
            echo "::notice::Primary LLM key hit 429 quota — retrying with backup key."
          fi
        fi
        echo "needs-retry=$needs_retry" >> "$GITHUB_OUTPUT"

    - name: Develop via Claude (backup key — primary hit 429)
      if: steps.detect-429.outputs.needs-retry == 'true' && inputs.api-key-backup != ''
      id: claude-run-backup
      continue-on-error: true
      uses: anthropics/claude-code-action@v1
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
      with:
        anthropic_api_key: ${{ inputs.api-key-backup }}
        github_token: ${{ inputs.repo-token }}
        prompt: |
          You are the develop module of the GithubAutoDev pipeline (Module 4, v2).

          Issue #${{ inputs.issue-number }}: ${{ steps.issue.outputs.title }}
          URL: ${{ steps.issue.outputs.url }}
          Detected issue language: ${{ inputs.issue-language }}
          Base branch: ${{ inputs.base-branch }} (DO NOT push to it)
          Head branch: ${{ inputs.head-branch }} (already checked out — commit here)

          Issue body:
          ```
          ${{ steps.issue.outputs.body }}
          ```
          ${{ inputs.prior-test-report != '' && '
          ## Prior test feedback (retry attempt)

          The previous Module 6 test run on this issue failed. The test report is
          included below. Review it carefully and fix the issues identified before
          committing. This is a retry — the prior implementation did not pass tests.

          ---

          ' || '' }}${{ inputs.prior-test-report }}

          ## Task
          Implement the issue on the head branch (already checked out for you).
          Make the smallest change that satisfies the issue. Write code, tests if
          applicable, and a brief implementation summary.

          ## Hard rules
          1. **Never push.** The caller workflow pushes and opens the PR. Your
             `settings.permissions.deny` list blocks `Bash(git push:*)` wholesale. You only commit.
          2. **Never check out main/master.** Stay on ${{ inputs.head-branch }}.
          3. **Never force-push, never reset --hard** (PRD §6 idempotency + §7 S3).
          4. **Match the natural language of the issue body** for any code comments,
             commit messages, and the implementation summary. Detected: ${{ inputs.issue-language }}.
             Technical identifiers (API names, library names) stay in their original language.
          5. **Context budget (PRD §5)**: only read directories named in the issue or
             CLAUDE.md${{ steps.cfg.outputs.context_paths && format('. Allowed paths: {0}', steps.cfg.outputs.context_paths) || '' }}. Do NOT scan the whole repo.
          6. **Never print tokens, API keys, or environment values** (PRD §7 S4).
          7. **Disclosure (AC-V2-15)**: your summary will appear in the PR body; the
             PR body is decorated by the caller workflow with the AI disclosure preamble.

          ## Output protocol (mandatory)

          Output ONLY a single JSON object on ONE line. No prose around it,
          no markdown fences, no hidden HTML comments. The downstream parser
          tolerates accidental wrapping but you should aim for one line.

          Schema:
          {"summary":"<one-paragraph change summary for the PR body, in the issue's language, >= 10 chars>","language":"<the language you wrote in: zh|en|ja|ko|es|fr|de|ru|pt|other>"}

          Field rules:
          - summary: >= 10 chars, plain text or markdown, will appear in PR body
          - language: exactly one of zh|en|ja|ko|es|fr|de|ru|pt|other
          - No trailing commas, no JSON comments, no surrounding text

          Respond with the JSON object only.
        settings: ${{ steps.cfg.outputs.settings }}

    - name: Capture head SHA + parse engine output
      id: emit
      if: always()
      shell: bash
      env:
        HEAD_BRANCH: ${{ inputs.head-branch }}
        EXEC_FILE: ${{ steps.claude-run-backup.outputs.execution_file || steps.claude-run.outputs.execution_file }}
        ISSUE_LANG: ${{ inputs.issue-language }}
      run: |
        set -uo pipefail
        sha=$(git rev-parse HEAD)
        # PR #143: GLM passthrough does not honor --json-schema strict mode.
        # Read assistant text from execution_file and parse tolerantly via
        # extract.sh. If parsing fails, extract.sh falls back to a default
        # summary + fallback language so the branch push still happens.
        raw=""
        if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
          # execution_file is a JSON array of transcript events; the final
          # {type:"result", result:"<text>"} entry holds the assistant's text.
          raw=$(jq -r '
            if type == "array" then
              ( [ .[] | select(.type == "result" and (.result | type == "string") and (.result | length > 0)) | .result ] | last // "" )
            else
              ( .result // "" )
            end
          ' "$EXEC_FILE" 2>/dev/null || echo "")
          # Fallback: last assistant message text if result extraction failed.
          if [ -z "$raw" ]; then
            raw=$(jq -r '
              if type == "array" then
                ( [ .[] | select(.type == "assistant")
                       | ((.message.content // []) | map(select(.type == "text") | .text) | join("\n")) ]
                  | map(select(length > 0)) | last // "" )
              else "" end
            ' "$EXEC_FILE" 2>/dev/null || echo "")
          fi
        else
          echo "::warning::execution_file missing — Claude step may have failed before producing output."
        fi
        if [ -z "$raw" ]; then
          echo "::warning::Could not extract assistant text from execution_file. Using default summary."
        fi
        echo "===== CLAUDE_RAW_START ====="
        printf '%s' "$raw" | head -c 3000
        echo ""
        echo "===== CLAUDE_RAW_END ====="
        # extract.sh writes summary + pr-language directly to GITHUB_OUTPUT.
        export STRUCTURED="$raw"
        bash ./.github/actions/develop/extract.sh || echo "::warning::extract.sh exited non-zero"
        # Append branch/sha (extract.sh owns summary/language).
        echo "branch-name=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
        echo "commit-sha=$sha" >> "$GITHUB_OUTPUT"
